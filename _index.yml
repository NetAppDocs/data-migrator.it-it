indexpage:
  title: NetApp Data Migrator documentazione
  summary: NetApp Data Migrator è un'applicazione software di migrazione dei dati
    di livello enterprise, multicloud, che semplifica la migrazione di dati di file
    non strutturati da sistemi di storage on-premises o storage di terze parti a servizi
    di cloud storage pubblici basati su NetApp. NetApp Data Migrator è un'applicazione
    indipendente che viene eseguita su macchine virtuali gestite dall'utente ed elimina
    la necessità di script personalizzati complessi e strumenti separati.
